spring:
  application:
    name: FormDigital
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/formularios
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    generate-ddl: true
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true